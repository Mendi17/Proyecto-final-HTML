<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistema de Pedidos</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor" style="color: white;">
        <h2>Bienvenido al Sistema</h2>
        <button onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>
    <br><br>
    <div class="contenedor" style="color: white;">
        <h1>ARMÁ TU COMBO</h1>
        <label for="hamburguesa">Elegí tu Hamburguesa:</label>
        <br>
        <select id="hamburguesa">
            <option value="Simple" style="color: black;">Simple ($5000)</option>
            <option value="Doble" style="color: black;">Doble ($6500)</option>
            <option value="Triple" style="color: black;">Triple ($8000)</option>
        </select>
        <br><br>
        <label for="bebida">Elegí tu Bebida:</label>
        <br>
        <select id="bebida">
            <option value="Agua" style="color: black;">Agua ($1500)</option>
            <option value="Gaseosa" style="color: black;">Gaseosa ($2000)</option>
        </select>
        <br><br>
        <label for="postre">Elegí tu Acompañamiento:</label>
        <br>
        <select id="postre">
            <option value="Ninguno" style="color: black;">Ninguno ($0)</option>
            <option value="Papas" style="color: black;">Papas Fritas ($2500)</option>
            <option value="Helado" style="color: black;">Helado ($3000)</option>
        </select>
        <br><br>
        <button onclick="calcularPedido()">Calcular Total</button>
        <p id="resultado_pedido"></p>
        <br>
        <button onclick="window.location.href='ticket.html'">Confirmar y pagar</button>
    </div>
    <br><br>
    <div class="contenedor" style="color: white;">
        <h2>Conocé nuestro local</h2>
        <a href="https://www.youtube.com/watch?v=nk2GRy7WABc" target="_blank">
            <img src="https://img.youtube.com/vi/nk2GRy7WABc/hqdefault.jpg" style="width: 100%; border: 2px solid #00e5ff; border-radius: 10px; max-width: 500px;" alt="Video del local">
        </a>
    </div>
    <br><br>
    <div class="contenedor" style="color: white;">
        <h2>Cómo llegar</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3405.0238128362635!2d-64.18431112443022!3d-31.41349887425126!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x943298816f1c7d3d%3A0x633512bcebbdc4e0!2sC%C3%B3rdoba%2C%20Argentina!5e0!3m2!1ses-419!2sar!4v1716075600000!5m2!1ses-419!2sar" width="100%" height="315" style="border: 2px solid #00e5ff; border-radius: 10px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <br><br>
    <script src="codigo.js"></script>
</body>
</html>
